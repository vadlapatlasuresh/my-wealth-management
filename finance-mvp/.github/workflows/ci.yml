name: CI

on:
  push:
    branches: ["**"]
  pull_request:

# All paths below are relative to the finance-mvp/ directory.
defaults:
  run:
    working-directory: finance-mvp

jobs:
  # ── Web (Vite) build ───────────────────────────────────────
  web:
    name: web (vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: finance-mvp/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build web
        run: npm run build -w apps/web

  # ── Spring services build (matrix, tests skipped) ──────────
  services:
    name: ${{ matrix.service }} (maven build)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - auth-service
          - account-aggregation-service
          - financial-core-service
          - real-estate-service
          - business-financials-service
          - ai-insights-service
          - payment-service
          - notification-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build ${{ matrix.service }}
        run: mvn -B -ntp -DskipTests clean package -f apps/${{ matrix.service }}/pom.xml

  # ── Mobile (Capacitor / EAS) — placeholder, gated behind secrets ──
  # Enable once signing creds (see .env.cross-platform.example) are added as
  # repository secrets. Until then this job is a documented placeholder.
  mobile:
    name: mobile (capacitor build) [placeholder]
    runs-on: macos-latest
    if: ${{ false }} # flip to a secrets check once signing creds exist
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: finance-mvp/package-lock.json
      # - name: Install dependencies
      #   run: npm ci
