spring.application.name=platform-config-service
server.port=8089
spring.profiles.active=dev

# JWT Configuration (for internal token validation) - SAME secret as other services
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Config Provider Configuration
# This service ships with a DbConfigProvider (DB-backed). A managed flag/config
# provider (LaunchDarkly / Unleash) could be wired here by supplying its SDK key
# and selecting the alternate ConfigProvider implementation.
# platform.config.provider=db
# platform.config.provider.sdk-key=REPLACE_WITH_MANAGED_PROVIDER_SDK_KEY

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=platform-config-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
