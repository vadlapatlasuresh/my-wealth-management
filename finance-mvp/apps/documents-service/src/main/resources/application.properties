spring.application.name=documents-service
server.port=8091
spring.profiles.active=dev

# JWT Configuration (for internal token validation — same shared secret as the other services)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Document upload storage. Default 'none' = link-only (no file uploads).
# Set storage.provider=gcs + gcs.bucket=<bucket> to store uploaded files in Google
# Cloud Storage. On the GCP VM, auth uses Application Default Credentials (the VM
# service account) — no key file needed. Mirrors business-financials-service.
storage.provider=${STORAGE_PROVIDER:none}
gcs.bucket=${GCS_BUCKET:}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:30MB}

# Internal key guarding /internal/** (cross-service register + account-deletion purge).
internal.key=${DOCUMENTS_INTERNAL_KEY:${AUDIT_INGEST_KEY:dev-internal-audit-key}}

# Public base URL used to build shareable links returned to the client.
app.web-url=${APP_WEB_URL:http://localhost:5173}

# notification-service (server-to-server, shared internal key) — share/access alerts.
service.notification.url=${NOTIFICATION_URI:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}
notifications.enabled=${NOTIFICATIONS_ENABLED:true}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=documents-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
