spring.application.name=secrets-service
server.port=8091
spring.profiles.active=dev

# JWT (admin endpoints validate the shared user token; same secret as all services)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Root Key-Encryption-Key material (the "secret zero"). In prod, replace LocalMasterKeyProvider
# with a GCP KMS-backed provider so this is NEVER set as an env value. Dev fallback is insecure.
secrets.master-key=${SECRETS_MASTER_KEY:}

# Shared key services present on the internal read endpoint (interim; upgrade to service-JWT/mTLS).
secrets.internal.key=${SECRETS_INTERNAL_KEY:dev-internal-secrets-key}

# Audit: emit secret.* events to the existing hash chain.
audit.uri=${AUDIT_URI:http://localhost:8090}
audit.ingest.key=${AUDIT_INGEST_KEY:dev-internal-audit-key}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Observability
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=secrets-service

logging.pattern.level=%5p [req:%X{requestId:-}]
