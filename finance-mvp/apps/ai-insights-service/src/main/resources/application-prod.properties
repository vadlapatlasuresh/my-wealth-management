# PostgreSQL Database for Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' with Flyway in production (Flyway owns the schema)
spring.jpa.hibernate.ddl-auto=validate

# JWT Secret (should be set via environment variable in production)
jwt.secret=${JWT_SECRET}

# AI Provider Configuration (mock | anthropic). Defaults to mock if AI_PROVIDER is unset.
ai.provider=${AI_PROVIDER:mock}
ai.model=${AI_MODEL:claude-opus-4-8}
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com}
anthropic.version=${ANTHROPIC_VERSION:2023-06-01}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:1024}

# Gateway URL used to fetch the user's financial snapshot for AI grounding context.
api-gateway.url=${API_GATEWAY_URL}
