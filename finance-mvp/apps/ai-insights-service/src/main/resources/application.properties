spring.application.name=ai-insights-service
server.port=8086
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

