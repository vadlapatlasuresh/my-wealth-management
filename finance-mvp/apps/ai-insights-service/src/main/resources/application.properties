spring.application.name=ai-insights-service
server.port=8086
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# AI Provider Configuration
# ai.provider=mock      -> deterministic MockAiProvider, NO network calls (default).
# ai.provider=anthropic -> real Claude-backed AnthropicAiProvider (requires ANTHROPIC_API_KEY).
# ai.provider=gemini    -> real Google Gemini-backed GeminiAiProvider (requires GEMINI_API_KEY).
# Any real provider grounds every reply in the user's real financial snapshot (fetched from
# financial-core via the gateway) and degrades to the mock automatically if the key is missing
# or a call fails.
ai.provider=${AI_PROVIDER:mock}
ai.model=${AI_MODEL:claude-opus-4-8}

# Anthropic / Claude settings (only used when ai.provider=anthropic)
anthropic.api-key=${ANTHROPIC_API_KEY:}
anthropic.base-url=${ANTHROPIC_BASE_URL:https://api.anthropic.com}
anthropic.version=${ANTHROPIC_VERSION:2023-06-01}
anthropic.max-tokens=${ANTHROPIC_MAX_TOKENS:1024}

# Google Gemini settings (only used when ai.provider=gemini)
gemini.api-key=${GEMINI_API_KEY:}
gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
gemini.max-tokens=${GEMINI_MAX_TOKENS:2048}
# Gemini 2.5 "thinks" by default and that consumes the output budget; 0 disables it.
# Set to -1 to omit thinkingConfig entirely (for models that don't accept it).
gemini.thinking-budget=${GEMINI_THINKING_BUDGET:0}

# Gateway URL used to fetch the user's financial snapshot for AI grounding context.
api-gateway.url=${API_GATEWAY_URL:http://localhost:8080}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=ai-insights-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
