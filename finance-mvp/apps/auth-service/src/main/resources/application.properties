spring.application.name=auth-service
server.port=8081
spring.profiles.active=dev

# JWT Configuration
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# PII encryption (SSN/EIN at rest). MUST be set in prod; dev falls back to an insecure key.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Multi-factor auth: require an emailed/texted code on every login.
mfa.enabled=${MFA_ENABLED:true}

# Password strength policy (enforced on change/reset; also served to the client via
# GET /api/v1/auth/password/policy so the UI checklist matches). Tune without code changes.
password.min-length=${PASSWORD_MIN_LENGTH:12}
password.require-uppercase=${PASSWORD_REQUIRE_UPPERCASE:true}
password.require-lowercase=${PASSWORD_REQUIRE_LOWERCASE:true}
password.require-digit=${PASSWORD_REQUIRE_DIGIT:true}
password.require-symbol=${PASSWORD_REQUIRE_SYMBOL:true}
password.forbid-whitespace=${PASSWORD_FORBID_WHITESPACE:true}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Audit-service (domain auth events: login success/failure, registration)
audit.uri=${AUDIT_URI:http://localhost:8090}
audit.ingest.key=${AUDIT_INGEST_KEY:dev-internal-audit-key}

# Customer care: email of the user to auto-promote to ADMIN+CARE on startup (first support account)
support.bootstrap.email=${SUPPORT_BOOTSTRAP_EMAIL:}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=auth-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]

# Social sign-in (OAuth/OIDC). Blank by default -> the provider is disabled and its
# button is hidden in the web app. Set the client ids to activate.
oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.apple.client-id=${APPLE_OAUTH_CLIENT_ID:}
