spring.application.name=auth-service
server.port=8081
spring.profiles.active=dev

# JWT Configuration
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# PII encryption (SSN/EIN at rest). MUST be set in prod; dev falls back to an insecure key.
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Multi-factor auth: require an emailed/texted code on every login.
mfa.enabled=${MFA_ENABLED:true}

# Password strength policy (enforced on change/reset; also served to the client via
# GET /api/v1/auth/password/policy so the UI checklist matches). Tune without code changes.
password.min-length=${PASSWORD_MIN_LENGTH:12}
password.require-uppercase=${PASSWORD_REQUIRE_UPPERCASE:true}
password.require-lowercase=${PASSWORD_REQUIRE_LOWERCASE:true}
password.require-digit=${PASSWORD_REQUIRE_DIGIT:true}
password.require-symbol=${PASSWORD_REQUIRE_SYMBOL:true}
password.forbid-whitespace=${PASSWORD_FORBID_WHITESPACE:true}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Audit-service (domain auth events: login success/failure, registration)
audit.uri=${AUDIT_URI:http://localhost:8090}
audit.ingest.key=${AUDIT_INGEST_KEY:dev-internal-audit-key}

# --- Ops portal (internal staff) ------------------------------------------------------------
# Ops identity is separate from customer identity: its own table (ops_users), its own login
# (/api/v1/ops/auth/**), and its own token type (typ=ops) that member routes refuse.

# First ops account, created on startup if it doesn't exist (see OpsBootstrap). Both are needed.
# This replaces SUPPORT_BOOTSTRAP_EMAIL, which promoted a *customer* to ADMIN+CARE.
ops.bootstrap.email=${OPS_BOOTSTRAP_EMAIL:}
ops.bootstrap.password=${OPS_BOOTSTRAP_PASSWORD:}

# Ops sessions are short: role changes only take effect on re-login, so the TTL bounds how long
# a revoked permission stays usable. Default 60 min (member tokens last 24h).
ops.jwt.expiration=${OPS_JWT_EXPIRATION:3600000}

# Ops login lockout — tighter than the member policy; these accounts can read every customer.
ops.lockout.max-attempts=${OPS_LOCKOUT_MAX_ATTEMPTS:5}
ops.lockout.minutes=${OPS_LOCKOUT_MINUTES:15}

# Echo ops MFA codes in the login response. Local dev only — deliberately NOT wired to
# OTP_EXPOSE_DEV_CODE, which is still true in prod pending SendGrid domain auth.
# Also gates the CALLER-verification OTP echo (the code sent to a customer to verify who's on
# the phone), for the same reason.
ops.otp.expose-dev-code=${OPS_OTP_EXPOSE_DEV_CODE:false}

# --- Caller verification (prove the person on the phone is the customer) ---------------------
# A verification session lasts one call. After this, the caller's tier drops to 0.
verify.session.minutes=${VERIFY_SESSION_MINUTES:30}
# Repeated failed verification is the fraud signal: this many fails in the window freezes the
# session and flags the account.
verify.lockout.max-fails=${VERIFY_MAX_FAILS:3}
verify.lockout.window-minutes=${VERIFY_FAIL_WINDOW_MINUTES:30}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=auth-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]

# Social sign-in (OAuth/OIDC). Blank by default -> the provider is disabled and its
# button is hidden in the web app. Set the client ids to activate.
oauth.google.client-id=${GOOGLE_OAUTH_CLIENT_ID:}
oauth.apple.client-id=${APPLE_OAUTH_CLIENT_ID:}

# Shared household — owner-pays gate. Creating a household requires the individual.household
# entitlement, resolved from payment-service. Set enforce=false where payment-service isn't
# running (local dev); the check fails CLOSED when it cannot be verified.
payment.uri=${PAYMENT_URI:http://localhost:8087}
household.entitlement.enforce=${HOUSEHOLD_ENTITLEMENT_ENFORCE:true}
