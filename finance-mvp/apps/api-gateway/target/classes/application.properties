spring.application.name=api-gateway
server.port=8080

# Spring Cloud Gateway (Eureka discovery disabled)
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# CORS Configuration for API Gateway
spring.web.cors.enabled=true
spring.web.cors.allowed-origins=http://localhost:5173
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,PATCH,OPTIONS
spring.web.cors.allowed-headers=*
spring.web.cors.allow-credentials=true
spring.web.cors.max-age=3600

# Explicitly disable Spring Boot's default CorsAutoConfiguration
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.web.servlet.CorsAutoConfiguration
