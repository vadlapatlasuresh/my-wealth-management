spring.application.name=api-gateway
server.port=8080

# Spring Cloud Gateway (Eureka discovery disabled)
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.main.allow-bean-definition-overriding=true

# CORS is handled solely by the reactive CorsWebFilter in GatewayCorsConfig — the single
# browser-facing entry point. Downstream services (account-aggregation) and the legacy Node
# API have had their own CORS disabled, so the gateway emits exactly one
# Access-Control-Allow-Origin header and the browser no longer sees duplicate values.
