spring.application.name=api-gateway
server.port=8080

# Spring Cloud Gateway (Eureka discovery disabled)
spring.cloud.gateway.discovery.locator.enabled=false
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.main.allow-bean-definition-overriding=true

# --- Audit logging (every request → audit-service) ---
audit.enabled=${AUDIT_ENABLED:true}
audit.uri=${AUDIT_URI:http://localhost:8090}
audit.ingest.key=${AUDIT_INGEST_KEY:dev-internal-audit-key}
# Shared JWT secret — used ONLY to decode the user id (subject) for audit attribution.
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}

# CORS is handled solely by the reactive CorsWebFilter in GatewayCorsConfig — the single
# browser-facing entry point. Downstream services (account-aggregation) and the legacy Node
# API have had their own CORS disabled, so the gateway emits exactly one
# Access-Control-Allow-Origin header and the browser no longer sees duplicate values.
