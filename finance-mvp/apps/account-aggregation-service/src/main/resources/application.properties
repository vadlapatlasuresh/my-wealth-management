spring.application.name=account-aggregation-service
server.port=8082

# Active profile: dev uses in-memory H2 (see application-dev.properties)
spring.profiles.active=dev

# Plaid Configuration — credentials come from the environment (never commit secrets).
# Set PLAID_CLIENT_ID / PLAID_SECRET in your .env (see .env.cross-platform.example).
# NOTE: the previously committed sandbox keys must be rotated in the Plaid dashboard.
plaid.client-id=${PLAID_CLIENT_ID:}
plaid.secret=${PLAID_SECRET:}
plaid.env=${PLAID_ENV:sandbox}
plaid.client-name=${PLAID_CLIENT_NAME:My Wealth Management}

# JWT Configuration (must match auth-service). Env-overridable; prod sets JWT_SECRET.
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# AES key used to encrypt Plaid access tokens at rest (REQUIRED in production).
app.encryption.key=${APP_ENCRYPTION_KEY:}

# Plaid webhook verification. Off in dev/sandbox; set true in production.
plaid.webhook.verify=${PLAID_WEBHOOK_VERIFY:false}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
