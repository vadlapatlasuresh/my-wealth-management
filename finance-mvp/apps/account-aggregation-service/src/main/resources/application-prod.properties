# PostgreSQL Database for Production
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# Use 'validate' with Flyway in production (Flyway owns the schema)
spring.jpa.hibernate.ddl-auto=validate

# Plaid Configuration (should be set via environment variables in production)
plaid.client-id=${PLAID_CLIENT_ID}
plaid.secret=${PLAID_SECRET}
plaid.env=${PLAID_ENV}

# JWT secret — fail closed in prod (no default). Must match auth-service.
jwt.secret=${JWT_SECRET}

# AES key for Plaid access-token encryption at rest — required in production.
app.encryption.key=${APP_ENCRYPTION_KEY}
