spring.application.name=real-estate-service
server.port=8084
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Demo/test data gating. Only this user id gets seeded demo properties; blank (the
# default) means NO user is seeded, so regular accounts are always clean.
app.demo.user-id=${DEMO_USER_ID:}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Notify the sponsor in-app when an investor expresses interest (best-effort).
service.notification.url=${NOTIFICATION_URI:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}
leads.notify.enabled=${LEADS_NOTIFY_ENABLED:true}

# auth-service internal lookup (all user ids) for broadcasting a new deal to the marketplace.
service.auth.url=${SERVICE_AUTH_URL:http://localhost:8081}
audit.ingest.key=${AUDIT_INGEST_KEY:${INTERNAL_KEY:dev-internal-audit-key}}
deals.broadcast.enabled=${DEALS_BROADCAST_ENABLED:true}

# Weekly deal-board roundup + weekly property snapshot (best-effort digests).
dealboard.weekly.enabled=${DEALBOARD_WEEKLY_ENABLED:true}
property.weekly.enabled=${PROPERTY_WEEKLY_ENABLED:true}

# Real Estate Valuation Provider Configuration
# Default is the deterministic, offline MockPropertyValuationProvider.
# Set realestate.provider=rentcast (+ a real API key) to activate the live
# RentcastPropertyValuationProvider. It degrades to the mock if the key is
# missing or a call fails, so the flow never hard-fails.
realestate.provider=${REALESTATE_PROVIDER:mock}
realestate.provider.base-url=${REALESTATE_PROVIDER_BASE_URL:https://api.rentcast.io/v1}
realestate.provider.api-key=${REALESTATE_PROVIDER_API_KEY:}

# Listing photos. Set storage.provider=gcs + gcs.bucket=<bucket> to store uploaded
# photos in Google Cloud Storage. Left as "none" uploads are refused with a 503 and
# listings simply carry no photos — nothing else on the directory is affected.
storage.provider=${STORAGE_PROVIDER:none}
gcs.bucket=${GCS_BUCKET:}
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:12MB}

# Weekly private-holdings nudge: overdue K-1s and uncalled capital. Silent when the user has
# nothing outstanding — an alert that fires regardless is one they learn to ignore.
holdings.alerts.enabled=${HOLDINGS_ALERTS_ENABLED:true}
holdings.alerts.cron=${HOLDINGS_ALERTS_CRON:0 30 8 * * MON}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=real-estate-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
