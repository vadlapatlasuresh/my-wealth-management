spring.application.name=real-estate-service
server.port=8084
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Notify the sponsor in-app when an investor expresses interest (best-effort).
service.notification.url=${NOTIFICATION_URI:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}
leads.notify.enabled=${LEADS_NOTIFY_ENABLED:true}

# Real Estate Valuation Provider Configuration
# TODO: A real valuation provider implementation (RentCast / ATTOM / Zillow)
#       would read its credentials from this key. The bundled
#       MockPropertyValuationProvider does not require it.
# realestate.provider.api-key=REPLACE_WITH_REAL_PROVIDER_API_KEY
