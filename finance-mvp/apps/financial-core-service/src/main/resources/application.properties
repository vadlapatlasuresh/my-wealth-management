spring.application.name=financial-core-service
server.port=8083
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Feign Client Configuration
# Point to the API Gateway for inter-service calls
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
api-gateway.url=http://localhost:8080

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=financial-core-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]

# Weekly net-worth digest -> notification-service internal ingest (shared key).
# notification-service gates delivery on each user's weeklySummary preference.
service.notification.url=${SERVICE_NOTIFICATION_URL:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}
summary.weekly.enabled=${SUMMARY_WEEKLY_ENABLED:true}
summary.weekly.cron=${SUMMARY_WEEKLY_CRON:0 0 8 * * MON}

# Daily net-worth snapshot job — keeps the history chart continuous for users who
# haven't opened the app (runs before the weekly digest above).
snapshot.daily.enabled=${SNAPSHOT_DAILY_ENABLED:true}
snapshot.daily.cron=${SNAPSHOT_DAILY_CRON:0 30 6 * * *}

# CPA license verification (NASBA CPAVerify). Flag-gated with a mock fallback: leave provider
# at "mock" (default) for a deterministic offline format check; set provider=nasba plus the
# base-url + api-key to call the live national database. A failed live call degrades to mock.
cpa.verify.provider=${CPA_VERIFY_PROVIDER:mock}
cpa.verify.nasba.base-url=${CPA_VERIFY_NASBA_BASE_URL:}
cpa.verify.nasba.api-key=${CPA_VERIFY_NASBA_API_KEY:}

# W-2 / 1099 document parsing for the tax estimator. Flag-gated with a mock fallback: the default
# provider "mock" runs deterministic regex extraction over the document text; setting an OCR engine
# (e.g. textract) would add real image OCR upstream. Documents are parsed in-memory, never stored.
tax.ocr.provider=${TAX_OCR_PROVIDER:mock}
