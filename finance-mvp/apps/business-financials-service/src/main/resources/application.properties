spring.application.name=business-financials-service
server.port=8085
spring.profiles.active=dev

# notification-service (server-to-server, shared internal key) — My Business event alerts.
service.notification.url=${NOTIFICATION_URI:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Document upload storage. Default 'none' = link-only (no file uploads).
# Set storage.provider=gcs + gcs.bucket=<bucket> to store uploaded files/images in
# Google Cloud Storage. On the GCP VM, auth uses Application Default Credentials
# (the VM service account) — no key file needed.
storage.provider=${STORAGE_PROVIDER:none}
gcs.bucket=${GCS_BUCKET:}
# Allow reasonably large document/image uploads.
spring.servlet.multipart.max-file-size=${UPLOAD_MAX_FILE_SIZE:25MB}
spring.servlet.multipart.max-request-size=${UPLOAD_MAX_REQUEST_SIZE:30MB}

# QuickBooks Online (QBO) Integration
# Default is the deterministic, offline MockBusinessDataProvider.
# Set business.provider=quickbooks (+ a real Intuit app's client id/secret) to activate
# the live QuickBooksBusinessDataProvider. Each user authorizes via the OAuth flow
# (POST /connect -> Intuit consent -> /oauth/callback). Calls degrade to the mock
# until a user has connected or if QBO is unreachable, so the flow never hard-fails.
business.provider=${BUSINESS_PROVIDER:mock}
qbo.client-id=${QBO_CLIENT_ID:}
qbo.client-secret=${QBO_CLIENT_SECRET:}
qbo.redirect-uri=${QBO_REDIRECT_URI:http://localhost:8085/api/v1/business/oauth/callback}
qbo.api-base-url=${QBO_API_BASE_URL:https://quickbooks.api.intuit.com}
qbo.authorize-url=${QBO_AUTHORIZE_URL:https://appcenter.intuit.com/connect/oauth2}
qbo.token-url=${QBO_TOKEN_URL:https://oauth.platform.intuit.com/oauth2/v1/tokens/bearer}
# Where the OAuth callback redirects the browser after completing the handshake.
app.web-url=${APP_WEB_URL:http://localhost:5173}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=business-financials-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
