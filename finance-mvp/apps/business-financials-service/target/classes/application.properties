spring.application.name=business-financials-service
server.port=8085
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# QuickBooks Online (QBO) Integration
# TODO: A real BusinessDataProvider implementation would use QuickBooks OAuth2 with these keys.
#       The current MockBusinessDataProvider returns deterministic data and ignores these.
# qbo.client-id=YOUR_QBO_CLIENT_ID
# qbo.client-secret=YOUR_QBO_CLIENT_SECRET
# qbo.redirect-uri=http://localhost:8085/api/v1/business/oauth/callback
