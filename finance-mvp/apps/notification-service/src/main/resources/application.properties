spring.application.name=notification-service
server.port=8088
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# --- Generic comms layer ---
# Active provider per channel (matched against ChannelProvider.name()).
# Real providers are wired and gated by config — flip the channel to activate:
#   email: mock | sendgrid     sms: mock | twilio     push: mock | fcm
comms.provider.sms=${COMMS_PROVIDER_SMS:mock}
comms.provider.email=${COMMS_PROVIDER_EMAIL:mock}
comms.provider.push=${COMMS_PROVIDER_PUSH:mock}
comms.provider.inapp=inapp

# Real provider credentials (only used when the matching channel is switched on above).
sendgrid.api-key=${SENDGRID_API_KEY:}
sendgrid.from=${SENDGRID_FROM:}
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from=${TWILIO_FROM:}
fcm.server-key=${FCM_SERVER_KEY:}
# Quiet hours window (24h, wraps past midnight). PUSH/SMS within window are deferred.
# Empty to disable. Example: comms.quietHours=22-7
comms.quietHours=

# Shared key for internal service-to-service notification ingest (X-Internal-Key).
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=notification-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
