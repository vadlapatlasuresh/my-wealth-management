spring.application.name=audit-service
server.port=8090
spring.profiles.active=dev

# JWT (validate tokens on query endpoints; same shared secret as all services)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Shared secret the gateway/services present on the internal ingest endpoint.
# Override in prod via AUDIT_INGEST_KEY. Empty disables the check (dev only).
audit.ingest.key=${AUDIT_INGEST_KEY:dev-internal-audit-key}

# Keys the tamper-evident audit hash chain (HMAC-SHA256) and the signed checkpoints.
# REQUIRED in production — the service refuses to start without it outside dev/test. An unkeyed
# chain only detects a careless UPDATE: anyone able to write to auditdb could otherwise rewrite a
# row AND recompute every later hash, and /verify would still report "valid".
# This is NOT the ingest key above: that one authenticates callers, this one signs history.
audit.chain.key=${AUDIT_CHAIN_KEY:}

# Daily checkpoint that pins the chain head (also emitted to the log as an out-of-band anchor).
audit.checkpoint.cron=${AUDIT_CHECKPOINT_CRON:0 15 3 * * *}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Offline geo-IP (MaxMind GeoLite2) for login-history location. Disabled by default;
# when off (or the db file is missing) the UI falls back to showing the raw IP.
# To enable: download GeoLite2-City.mmdb from a free MaxMind account, then set
# GEOIP_ENABLED=true and GEOIP_DB_PATH=/path/to/GeoLite2-City.mmdb.
geoip.enabled=${GEOIP_ENABLED:false}
geoip.db-path=${GEOIP_DB_PATH:}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=audit-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]

# System health monitoring + failure alerting. Polls each service's /actuator/health,
# logs UP/DOWN transitions to system_health_event, and (if an admin user is set) emails
# them via notification-service on each change.
monitor.enabled=${MONITOR_ENABLED:true}
monitor.cron=${MONITOR_CRON:0 */2 * * * *}
monitor.services=${MONITOR_SERVICES:}
monitor.alert.admin-user-id=${MONITOR_ALERT_ADMIN_USER_ID:}
service.notification.url=${SERVICE_NOTIFICATION_URL:http://localhost:8088}
notifications.internal.key=${NOTIFICATIONS_INTERNAL_KEY:${AUDIT_INGEST_KEY:dev-internal-audit-key}}
