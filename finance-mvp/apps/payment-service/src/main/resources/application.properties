spring.application.name=payment-service
server.port=8087
spring.profiles.active=dev

# JWT Configuration (for internal token validation)
jwt.secret=${JWT_SECRET:THIS_IS_A_VERY_LONG_AND_SECURE_SECRET_KEY_FOR_JWT_AUTHENTICATION_DEMO_PURPOSES_ONLY_REPLACE_IN_PRODUCTION}
jwt.expiration=86400000

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Payment provider: mock (default, no network) | stripe (real PaymentIntents).
payment.provider=${PAYMENT_PROVIDER:mock}

# --- Financial ops (ledger + maker-checker adjustments) --------------------------------------
# NOTE: with payment.provider=mock (the default), an ops REFUND writes a real ledger entry and a
# real audit trail but moves NO money — MockRefundProvider says so loudly in the logs. Set
# payment.provider=stripe with STRIPE_SECRET_KEY to actually refund. Unlike charges, a failed
# Stripe refund does NOT degrade to the mock: it fails the adjustment, because a refund that only
# looks executed is worse than one that visibly didn't happen.
#
# The auto-approve threshold is NOT here on purpose — it lives in the ops_finance_config table so
# it can be retuned from evidence without a deploy. Default: $25.

# Nightly anomaly scan thresholds. Tuned to flag things worth a human's time, not to fill a
# dashboard; loosen them if the queue gets noisy, because a queue that cries wolf gets ignored.
ops.anomaly.cron=${OPS_ANOMALY_CRON:0 30 3 * * *}
ops.anomaly.window-days=${OPS_ANOMALY_WINDOW_DAYS:30}
ops.anomaly.refund-count-threshold=${OPS_ANOMALY_REFUND_COUNT:3}
ops.anomaly.refund-amount-threshold-cents=${OPS_ANOMALY_REFUND_AMOUNT_CENTS:50000}
# An agent this many times their peer MEDIAN is flagged (median, not mean — one outlier drags a
# mean up until it stops flagging the outlier).
ops.anomaly.agent-outlier-multiple=${OPS_ANOMALY_AGENT_MULTIPLE:3}
stripe.secret-key=${STRIPE_SECRET_KEY:}
stripe.base-url=${STRIPE_BASE_URL:https://api.stripe.com}

# Stripe webhook signing secret (whsec_...). Blank in dev -> signature check skipped.
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:}
stripe.webhook.tolerance-seconds=${STRIPE_WEBHOOK_TOLERANCE:300}

# Observability: expose health + Prometheus metrics for scraping.
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.metrics.tags.application=payment-service

# Correlation id in every log line (set by RequestIdFilter from X-Request-Id).
logging.pattern.level=%5p [req:%X{requestId:-}]
