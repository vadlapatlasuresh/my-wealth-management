# ============================================================
#  PRODUCTION / prod-like stack — all services + Caddy (auto-HTTPS)
#  Brings up the API gateway, 9 downstream Spring Boot services, and a
#  Caddy reverse proxy. ONLY Caddy is publicly exposed (80/443); every
#  service talks to its neighbours over the internal `wealth` network
#  using compose DNS (e.g. http://auth-service:8081).
#
#  Postgres is EXTERNAL (Neon) by default — set DATABASE_URL per service in .env.prod.
#  To run Postgres locally instead, uncomment the `postgres` service at the bottom
#  and point DATABASE_URL at jdbc:postgresql://postgres:5432/wealth.
#
#  Usage:
#    cp .env.prod.example .env.prod   # fill in secrets
#    export TAG=$(git rev-parse --short HEAD)   # or a released SHA
#    docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
#  Images are pulled from GHCR (built+pushed by CI). To build locally instead,
#  use the `build:` blocks (uncomment) or the Dockerfile.java-service one-liners.
# ============================================================

x-java-defaults: &java-defaults
  restart: unless-stopped
  networks: [wealth]
  environment: &java-env
    SPRING_PROFILES_ACTIVE: prod
    JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET in .env.prod}
    # Every container listens on a UNIFORM internal port (8080) so the shared healthcheck
    # and compose-DNS URLs are identical for all services. Spring relaxed-binding maps
    # SERVER_PORT -> server.port, overriding the per-service port in application.properties.
    SERVER_PORT: "8080"
    # Audit: any service can emit domain audit events to the audit-service.
    AUDIT_URI: http://audit-service:8080
    AUDIT_INGEST_KEY: ${AUDIT_INGEST_KEY:?set AUDIT_INGEST_KEY in .env.prod}
    # Centralized secret store: services fetch their scoped secrets at boot.
    SECRETS_URI: http://secrets-service:8080
    SECRETS_INTERNAL_KEY: ${SECRETS_INTERNAL_KEY:?set SECRETS_INTERNAL_KEY in .env.prod}
    # JVM sizing for a small multi-service host. The previous default
    # (-XX:MaxRAMPercentage=75) sized EACH heap to 75% of TOTAL host RAM because no
    # per-container mem_limit was set — so 11 JVMs cold-booting together over-committed
    # memory and the OS OOM-killed services mid-deploy (e.g. auth restarting once).
    # A FIXED modest heap bounds each service regardless of host size; SerialGC suits
    # small heaps; TieredStopAtLevel=1 + disabled JMX speed cold start (less boot
    # contention). Override per-host via JVM_OPTS in .env.prod (e.g. raise -Xmx on a
    # big box, or lower it further on a tiny one).
    JAVA_TOOL_OPTIONS: "${JVM_OPTS:--Xms64m -Xmx384m -XX:+UseSerialGC -XX:MaxMetaspaceSize=160m -XX:TieredStopAtLevel=1 -Dspring.jmx.enabled=false}"
    # Neon connection budget: cap each service's pool so 10 services don't exhaust
    # Postgres' connection limit (10 * 5 = 50 max). minimum-idle keeps it lean.
    SPRING_DATASOURCE_HIKARI_MAXIMUM_POOL_SIZE: "5"
    SPRING_DATASOURCE_HIKARI_MINIMUM_IDLE: "1"
    # Graceful shutdown: on SIGTERM, stop accepting new requests and drain in-flight
    # ones (up to the timeout) before exiting, so a rolling deploy drops zero requests.
    SERVER_SHUTDOWN: graceful
    SPRING_LIFECYCLE_TIMEOUT_PER_SHUTDOWN_PHASE: 20s
  # Give Spring time to drain before Docker SIGKILLs the container (default is 10s,
  # shorter than the 20s drain window above).
  stop_grace_period: 30s
  healthcheck:
    # TCP liveness: the port only accepts connections once Spring/Tomcat is fully started.
    # (We don't hit /actuator/health here because most services secure it -> 403, which
    # would make a working app look unhealthy. Liveness on the port is the right signal.)
    test: ["CMD-SHELL", "timeout 5 bash -c '</dev/tcp/127.0.0.1/8080'"]
    interval: 20s
    timeout: 8s
    retries: 12
    # Generous grace: on this small VM the heavier services (auth runs Flyway +
    # scheduling) can take a while to open the port on a cold deploy. During this
    # window a not-yet-ready container stays "starting" (not "unhealthy"), so a
    # dependent's `depends_on: service_healthy` keeps waiting instead of aborting.
    start_period: 300s
  deploy:
    resources:
      limits:
        # Per-service cap. Override via SVC_MEM_LIMIT in .env.prod (e.g. 450M on a 6GB box).
        memory: ${SVC_MEM_LIMIT:-640M}

# Services whose secrets live ONLY in the store (provider keys are blank in .env.prod after
# centralization) MUST wait for secrets-service to be healthy. Otherwise their boot-time
# secrets-client fetch races the store, fails, and they fall back to (blank) env — silently
# disabling Plaid/SendGrid/Gemini/etc. until the next restart.
x-needs-secrets: &needs-secrets
  secrets-service:
    condition: service_healthy

services:
  # ---------------- Reverse proxy (the only public service) ----------------
  caddy:
    image: caddy:2-alpine
    container_name: wealth-caddy
    restart: unless-stopped
    networks: [wealth]
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Built web SPA (apps/web/dist) staged here; Caddy serves it at /. Populated by
      # the web-build step in deploy/deploy.sh. (All-in-one: web + API on one VM.)
      - ./web-dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env.prod}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.prod}
    depends_on:
      api-gateway:
        condition: service_healthy

  # ---------------- API Gateway (public entry, no DB) ----------------
  api-gateway:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-api-gateway:${TAG:-latest}
    container_name: wealth-api-gateway
    # build: { context: ., dockerfile: Dockerfile.java-service, args: { SERVICE: api-gateway } }
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,audit
      # Downstream routing → compose DNS. All services listen on 8080 internally (SERVER_PORT).
      SERVICE_AUTH_URI: http://auth-service:8080
      SERVICE_AGGREGATION_URI: http://account-aggregation-service:8080
      SERVICE_FINANCIAL_CORE_URI: http://financial-core-service:8080
      SERVICE_REAL_ESTATE_URI: http://real-estate-service:8080
      SERVICE_BUSINESS_URI: http://business-financials-service:8080
      SERVICE_AI_URI: http://ai-insights-service:8080
      SERVICE_PAYMENT_URI: http://payment-service:8080
      SERVICE_NOTIFICATION_URI: http://notification-service:8080
      SERVICE_PLATFORM_CONFIG_URI: http://platform-config-service:8080
      SERVICE_AUDIT_URI: http://audit-service:8080
      # Legacy Node API is NOT deployed in prod; point at a dead address so /v1/** 503s cleanly
      SERVICE_LEGACY_NODE_URI: http://127.0.0.1:4000
      # CORS: only the real web origin(s), comma-separated. NO wildcard in prod.
      GATEWAY_CORS_ALLOWED_ORIGINS: ${WEB_ORIGINS:?set WEB_ORIGINS in .env.prod}
    depends_on:
      auth-service: { condition: service_healthy }
      financial-core-service: { condition: service_healthy }

  # ---------------- Stateful services (Postgres-backed) ----------------
  auth-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-auth-service:${TAG:-latest}
    container_name: wealth-auth-service
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,encryption,audit
      DATABASE_URL: ${AUTH_DATABASE_URL:?}
      DATABASE_USER: ${AUTH_DATABASE_USER:?}
      DATABASE_PASSWORD: ${AUTH_DATABASE_PASSWORD:?}
      # Where auth-service POSTs OTP codes for delivery (NotificationClient ->
      # notification-service /internal/comms/otp). Without this it defaults to
      # localhost:8088 and silently calls itself, so real email/SMS never sends.
      # The X-Internal-Key both sides use resolves from the shared AUDIT_INGEST_KEY.
      NOTIFICATION_URI: http://notification-service:8080
      # Delete-cascade (GDPR): the data services auth-service purges on account
      # deletion (DELETE /internal/users/{id}). Without this it defaults to
      # localhost ports and silently purges nothing in prod, leaving orphaned data.
      PURGE_TARGETS: http://account-aggregation-service:8080,http://financial-core-service:8080,http://real-estate-service:8080,http://business-financials-service:8080,http://ai-insights-service:8080,http://payment-service:8080,http://notification-service:8080
      # SECURITY: returns OTP codes in API responses so signup/MFA work WITHOUT a
      # real email/SMS provider. Defaults true to preserve the current key-less
      # test setup. MUST be set OTP_EXPOSE_DEV_CODE=false in .env.prod before real
      # users (do it together with enabling SendGrid/Twilio, or codes won't deliver).
      OTP_EXPOSE_DEV_CODE: ${OTP_EXPOSE_DEV_CODE:-true}
      # Social sign-in. Blank -> provider disabled + button hidden. Set to activate.
      GOOGLE_OAUTH_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID:-}
      APPLE_OAUTH_CLIENT_ID: ${APPLE_OAUTH_CLIENT_ID:-}

  account-aggregation-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-account-aggregation-service:${TAG:-latest}
    container_name: wealth-account-aggregation-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,encryption,plaid
      DATABASE_URL: ${AGG_DATABASE_URL:?}
      DATABASE_USER: ${AGG_DATABASE_USER:?}
      DATABASE_PASSWORD: ${AGG_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # AES key to encrypt Plaid access tokens at rest (required by EncryptionKeyHolder)
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY in .env.prod}
      PLAID_CLIENT_ID: ${PLAID_CLIENT_ID:-}
      PLAID_SECRET: ${PLAID_SECRET:-}
      PLAID_ENV: ${PLAID_ENV:-sandbox}

  financial-core-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-financial-core-service:${TAG:-latest}
    container_name: wealth-financial-core-service
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,notifications-internal
      DATABASE_URL: ${CORE_DATABASE_URL:?}
      DATABASE_USER: ${CORE_DATABASE_USER:?}
      DATABASE_PASSWORD: ${CORE_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Weekly net-worth digest -> notification-service (best-effort, shared key)
      SERVICE_NOTIFICATION_URL: http://notification-service:8080
      NOTIFICATIONS_INTERNAL_KEY: ${NOTIFICATIONS_INTERNAL_KEY:-}

  real-estate-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-real-estate-service:${TAG:-latest}
    container_name: wealth-real-estate-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,realestate,notifications-internal
      DATABASE_URL: ${RE_DATABASE_URL:?}
      DATABASE_USER: ${RE_DATABASE_USER:?}
      DATABASE_PASSWORD: ${RE_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Valuation provider: mock (default) | rentcast. Set both flag + key to go live.
      REALESTATE_PROVIDER: ${REALESTATE_PROVIDER:-mock}
      REALESTATE_PROVIDER_BASE_URL: ${REALESTATE_PROVIDER_BASE_URL:-https://api.rentcast.io/v1}
      REALESTATE_PROVIDER_API_KEY: ${REALESTATE_PROVIDER_API_KEY:-}
      # Deal Room lead notifications -> notification-service (best-effort, shared key)
      SERVICE_NOTIFICATION_URL: http://notification-service:8080
      NOTIFICATIONS_INTERNAL_KEY: ${NOTIFICATIONS_INTERNAL_KEY:-}

  business-financials-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-business-financials-service:${TAG:-latest}
    container_name: wealth-business-financials-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,qbo
      DATABASE_URL: ${BIZ_DATABASE_URL:?}
      DATABASE_USER: ${BIZ_DATABASE_USER:?}
      DATABASE_PASSWORD: ${BIZ_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Business data provider: mock (default) | quickbooks. Set flag + QBO app creds to go live.
      BUSINESS_PROVIDER: ${BUSINESS_PROVIDER:-mock}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT:-sandbox}
      QBO_API_BASE_URL: ${QBO_API_BASE_URL:-https://quickbooks.api.intuit.com}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-}
      APP_WEB_URL: ${APP_WEB_URL:-}

  ai-insights-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-ai-insights-service:${TAG:-latest}
    container_name: wealth-ai-insights-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,gemini,anthropic,openai
      DATABASE_URL: ${AI_DATABASE_URL:?}
      DATABASE_USER: ${AI_DATABASE_USER:?}
      DATABASE_PASSWORD: ${AI_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # AI provider: mock (default) | anthropic | gemini
      AI_PROVIDER: ${AI_PROVIDER:-mock}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-claude-opus-4-8}
      # Google Gemini (used when AI_PROVIDER=gemini)
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}

  payment-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-payment-service:${TAG:-latest}
    container_name: wealth-payment-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,stripe,notifications-internal
      DATABASE_URL: ${PAY_DATABASE_URL:?}
      DATABASE_USER: ${PAY_DATABASE_USER:?}
      DATABASE_PASSWORD: ${PAY_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Provider toggle: mock (default) | stripe. Set PAYMENT_PROVIDER=stripe + keys to go live.
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-mock}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      # Payment reminders -> notification-service in-app ingest (best-effort, shared key,
      # same pattern as real-estate's deal alerts). The key loads from the store via the
      # notifications-internal scope above.
      SERVICE_NOTIFICATION_URL: http://notification-service:8080
      NOTIFICATIONS_INTERNAL_KEY: ${NOTIFICATIONS_INTERNAL_KEY:-}

  notification-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-notification-service:${TAG:-latest}
    container_name: wealth-notification-service
    depends_on:
      <<: *needs-secrets
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,sendgrid,twilio,fcm,notifications-internal
      DATABASE_URL: ${NOTIF_DATABASE_URL:?}
      DATABASE_USER: ${NOTIF_DATABASE_USER:?}
      DATABASE_PASSWORD: ${NOTIF_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Resolve a user's email (for alert emails) from auth-service. Uses the shared
      # AUDIT_INGEST_KEY as X-Internal-Key (already in the env anchor).
      SERVICE_AUTH_URL: http://auth-service:8080
      # Channel provider toggles: mock (default) | sendgrid / twilio / fcm.
      # Set the toggle AND the matching keys to go live for each channel.
      COMMS_PROVIDER_EMAIL: ${COMMS_PROVIDER_EMAIL:-mock}
      COMMS_PROVIDER_SMS: ${COMMS_PROVIDER_SMS:-mock}
      COMMS_PROVIDER_PUSH: ${COMMS_PROVIDER_PUSH:-mock}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM: ${SENDGRID_FROM:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM: ${TWILIO_FROM:-}
      FCM_SERVER_KEY: ${FCM_SERVER_KEY:-}
      # Shared key the real-estate-service presents to /notifications/internal
      NOTIFICATIONS_INTERNAL_KEY: ${NOTIFICATIONS_INTERNAL_KEY:-}

  platform-config-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-platform-config-service:${TAG:-latest}
    container_name: wealth-platform-config-service
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt
      DATABASE_URL: ${CONFIG_DATABASE_URL:?}
      DATABASE_USER: ${CONFIG_DATABASE_USER:?}
      DATABASE_PASSWORD: ${CONFIG_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Skip strict Hibernate validate: the disclaimer.body_markdown entity is @Lob
      # (expects CLOB/oid) but the Flyway migration uses text. Flyway owns the schema;
      # validate is too strict here. TODO: align the entity mapping to text and re-enable.
      SPRING_JPA_HIBERNATE_DDL_AUTO: none

  audit-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-audit-service:${TAG:-latest}
    container_name: wealth-audit-service
    environment:
      <<: *java-env
      SECRETS_SCOPES: jwt,audit,notifications-internal
      DATABASE_URL: ${AUDIT_DATABASE_URL:?}
      DATABASE_USER: ${AUDIT_DATABASE_USER:?}
      DATABASE_PASSWORD: ${AUDIT_DATABASE_PASSWORD:?}
      API_GATEWAY_URL: http://api-gateway:8080
      # Health monitor: polls every service + emails an admin on UP/DOWN transitions.
      SERVICE_NOTIFICATION_URL: http://notification-service:8080
      NOTIFICATIONS_INTERNAL_KEY: ${NOTIFICATIONS_INTERNAL_KEY:-}
      MONITOR_ALERT_ADMIN_USER_ID: ${MONITOR_ALERT_ADMIN_USER_ID:-}   # set to your admin user id to get alert emails

  # ---------------- Centralized secret store ----------------
  secrets-service:
    <<: *java-defaults
    image: ghcr.io/${GHCR_OWNER:-OWNER}/wealth-secrets-service:${TAG:-latest}
    container_name: wealth-secrets-service
    environment:
      <<: *java-env
      DATABASE_URL: ${SECRETS_DATABASE_URL:?}
      DATABASE_USER: ${SECRETS_DATABASE_USER:?}
      DATABASE_PASSWORD: ${SECRETS_DATABASE_PASSWORD:?}
      # KEK provider: local | kms.
      #   kms (recommended in prod): KEK lives in Cloud KMS, NO secret here. Set
      #     SECRETS_PROVIDER=kms + SECRETS_KMS_KEY_NAME (terraform output secrets_kms_key_name);
      #     the VM's service account (infra/gcp/kms.tf) authorizes wrap/unwrap.
      #   local: derive KEK from SECRETS_MASTER_KEY (the one interim secret).
      SECRETS_PROVIDER: ${SECRETS_PROVIDER:-local}
      SECRETS_KMS_KEY_NAME: ${SECRETS_KMS_KEY_NAME:-}
      SECRETS_MASTER_KEY: ${SECRETS_MASTER_KEY:-} # required only when SECRETS_PROVIDER=local

  # ---------------- OPTIONAL local Postgres (instead of Neon) ----------------
  # Uncomment to self-host Postgres in the stack. Then set every *_DATABASE_URL to
  # jdbc:postgresql://postgres:5432/wealth (one DB, schema-per-service) in .env.prod.
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: wealth-postgres
  #   restart: unless-stopped
  #   networks: [wealth]
  #   environment:
  #     POSTGRES_DB: ${POSTGRES_DB:-wealth}
  #     POSTGRES_USER: ${POSTGRES_USER:-wealth}
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?}
  #   volumes:
  #     - pgdata:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wealth}"]
  #     interval: 5s
  #     timeout: 3s
  #     retries: 10

networks:
  wealth:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
  # pgdata:
