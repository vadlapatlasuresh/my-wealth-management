<!doctype html>
<html lang="en" data-theme="glass-dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TerraVest · Design Sync Studio</title>
<!--
  ============================================================================
  TerraVest — Design Sync Studio
  ============================================================================
  WHY THIS FILE EXISTS (the modernization):
  The three legacy mockups (assets/terravest-redesign.html, mobile/terravest-ios.html,
  mobile/terravest-android.html) are hand-authored static HTML. Per docs/DESIGN_SYNC.md
  they DRIFT: every shipped feature had to be hand-copied into three files, and they fell
  out of date. This tool replaces that anti-pattern with the 2024/2025 best-practice
  approach: ONE SINGLE SOURCE OF TRUTH (the `SCREENS` model) drives every view, so Web /
  iOS / Android can never disagree — they are literally the same data rendered three ways.

  It satisfies the four modernization requirements:
    1. SYNC        — a tiny observable store (createStore) is the one source of truth;
                     editing anything re-renders all three device panels in real time.
    2. CLARITY     — a grouped section navigator + breadcrumb + per-panel labels make it
                     obvious which app area each visualization represents.
    3. LIVE EDIT   — an in-place code editor (the active screen's spec as JSON) updates the
                     visualization instantly on every keystroke (debounced), with error
                     feedback that never breaks the last good render.
    4. MODERN UI   — glass-dark design language matching the app redesign, responsive grid,
                     accessible contrast/focus, smooth transitions, component architecture.

  It is fully SELF-CONTAINED: no external fonts, icons, or scripts, so it works offline and
  can be opened directly in any browser (like the legacy mockups) — nothing was removed.
  ============================================================================
-->
<style>
  /* --- Design tokens: the glass-dark language from the app's terravest-theme.css.
         Kept as CSS variables so the whole tool re-themes from one place. --- */
  :root{
    --bg:#0A0F1A; --card:rgba(26,35,50,.58); --card-solid:#141c28;
    --border:rgba(255,255,255,.10); --border-soft:rgba(255,255,255,.055);
    --text:#F3F6FA; --text-2:#C2CEDA; --muted:#8B9AAB;
    --forest:#2E7D5B; --forest-light:#5BB98C; --gold:#E6B455;
    --positive:#3DDC97; --negative:#F0776B; --warning:#E9C46A;
    --r-sm:8px; --r-md:12px; --r-lg:18px; --r-xl:26px;
    --shadow:0 8px 26px rgba(0,0,0,.45);
    /* Canonical section colors — same idea as the app's category palette:
       one stable color per section so identifiability is instant (requirement 2). */
    --sec-today:#4EA8F0; --sec-money:#3DDC97; --sec-grow:#E6B455;
    --sec-shared:#C77DD6; --sec-business:#F0803C; --sec-realestate:#2CC4C4; --sec-more:#9AAEA4;
    --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,Consolas,'Liberation Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    font-family:var(--font); color:var(--text); line-height:1.5;
    -webkit-font-smoothing:antialiased;
    /* the multi-hue gradient canvas from the app's glass-dark theme */
    background:
      radial-gradient(900px 600px at 12% -5%, rgba(122,111,240,.20), transparent 55%),
      radial-gradient(820px 620px at 100% 0%, rgba(46,125,91,.22), transparent 55%),
      radial-gradient(760px 720px at 50% 120%, rgba(240,128,60,.12), transparent 55%),
      linear-gradient(160deg,#0B1220 0%,#0A0F1A 50%,#0C1524 100%) fixed;
  }
  /* Frosted card primitive — the single reusable surface, used everywhere. */
  .glass{background:var(--card);backdrop-filter:blur(20px) saturate(140%);
    -webkit-backdrop-filter:blur(20px) saturate(140%);border:1px solid var(--border);
    border-radius:var(--r-lg);box-shadow:var(--shadow)}
  :where(a,button,input,textarea,[tabindex]):focus-visible{outline:2px solid var(--forest-light);outline-offset:2px;border-radius:6px}

  /* ---------- App chrome ---------- */
  .topbar{display:flex;align-items:center;gap:16px;padding:14px 22px;border-bottom:1px solid var(--border-soft);
    position:sticky;top:0;z-index:20;backdrop-filter:blur(14px);background:rgba(10,15,26,.55)}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.2px}
  .brand .mark{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--forest),var(--forest-light));font-size:15px}
  .crumb{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;flex-wrap:wrap}
  .crumb .sec-dot{width:9px;height:9px;border-radius:3px}
  .crumb strong{color:var(--text);font-weight:600}
  .sync{margin-left:auto;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--muted)}
  .sync .pulse{width:9px;height:9px;border-radius:50%;background:var(--positive);box-shadow:0 0 0 0 rgba(61,220,151,.6)}
  .sync .pulse.on{animation:pulse .6s ease}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(61,220,151,.6)}100%{box-shadow:0 0 0 10px rgba(61,220,151,0)}}

  /* ---------- Three-column workspace (responsive) ---------- */
  .work{display:grid;grid-template-columns:230px 1fr 380px;gap:16px;padding:16px;align-items:start}
  @media (max-width:1200px){.work{grid-template-columns:210px 1fr}.editor-col{grid-column:1 / -1}}
  @media (max-width:760px){.work{grid-template-columns:1fr}}

  /* Navigator (requirement 2: clear identifiability) */
  .nav{padding:12px;position:sticky;top:74px}
  .nav h2{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 8px 6px}
  .nav h2:first-child{margin-top:2px}
  .nav-item{display:flex;align-items:center;gap:9px;width:100%;text-align:left;background:none;border:none;
    color:var(--text-2);font:inherit;font-size:13.5px;padding:8px 10px;border-radius:10px;cursor:pointer;transition:.15s}
  .nav-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
  .nav-item[aria-current="true"]{background:rgba(255,255,255,.09);color:var(--text);font-weight:600}
  .nav-item .dot{width:8px;height:8px;border-radius:3px;flex:0 0 auto}
  .nav-item .new{margin-left:auto;font-size:9.5px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:999px;
    background:rgba(230,180,85,.16);color:var(--gold)}

  /* Preview column: three synced device frames */
  .previews{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;align-items:flex-start;padding:8px}
  .device{display:flex;flex-direction:column;gap:8px;align-items:center}
  .device-label{font-size:11.5px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .device-label .d-dot{width:7px;height:7px;border-radius:50%;background:var(--forest-light)}

  /* Web browser frame */
  .frame-web{width:520px;max-width:100%;border-radius:var(--r-lg);overflow:hidden;border:1px solid var(--border);
    background:var(--card);box-shadow:var(--shadow)}
  .frame-web .bar{display:flex;align-items:center;gap:6px;padding:9px 12px;background:rgba(255,255,255,.04);border-bottom:1px solid var(--border-soft)}
  .frame-web .bar i{width:11px;height:11px;border-radius:50%;background:rgba(255,255,255,.18)}
  .frame-web .url{margin-left:8px;font-size:11px;color:var(--muted);font-family:var(--mono)}
  /* Phone frames */
  .frame-phone{width:290px;max-width:100%;padding:12px;border-radius:38px;background:linear-gradient(160deg,#1b2430,#0e141d);
    border:1px solid var(--border);box-shadow:var(--shadow)}
  .frame-phone.android{border-radius:30px}
  .frame-phone .notch{height:22px;display:flex;justify-content:center;align-items:center}
  .frame-phone .notch::after{content:"";width:120px;height:7px;border-radius:999px;background:rgba(0,0,0,.5)}
  .frame-phone.android .notch::after{width:9px;height:9px;border-radius:50%;background:rgba(0,0,0,.6)}
  .screen{background:var(--bg);border-radius:12px;overflow:hidden;max-height:560px;overflow-y:auto}
  .frame-phone .screen{border-radius:22px}
  .frame-phone.android .screen{border-radius:16px}
  .screen::-webkit-scrollbar{width:7px}.screen::-webkit-scrollbar-thumb{background:rgba(255,255,255,.14);border-radius:8px}

  /* ---------- Rendered screen content (the shared component library) ---------- */
  .sc{padding:16px;display:flex;flex-direction:column;gap:12px}
  .sc-head .t{font-size:19px;font-weight:700;font-family:var(--font)}
  .sc-head .s{font-size:12.5px;color:var(--muted);margin-top:2px}
  .sc-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:14px;
    backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px)}
  .sc-card .ct{font-size:13.5px;font-weight:700;margin-bottom:10px}
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(96px,1fr));gap:8px}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);padding:10px}
  .kpi .l{font-size:10.5px;color:var(--muted)}
  .kpi .v{font-size:17px;font-weight:700;margin-top:2px}
  .kpi .d{font-size:10.5px;font-weight:700}
  .kpi .d.up{color:var(--positive)}.kpi .d.down{color:var(--negative)}
  .row{display:flex;align-items:center;gap:10px;padding:7px 0;border-bottom:1px solid var(--border-soft)}
  .row:last-child{border-bottom:none}
  .row .dot{width:10px;height:10px;border-radius:3px;flex:0 0 auto}
  .row .rl{flex:1;min-width:0;font-size:12.5px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .row .rs{font-size:11px;color:var(--muted)}
  .row .rv{font-weight:700;font-size:12.5px}
  .pill{display:inline-block;padding:2px 8px;border-radius:999px;font-size:10.5px;font-weight:700}
  .barsc{display:flex;align-items:flex-end;gap:8px;height:120px}
  .barsc .col{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:0}
  .barsc .stack{width:100%;max-width:34px;display:flex;flex-direction:column-reverse;border-radius:8px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,.3)}
  .barsc .cl{font-size:9.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.03em}
  .legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px}
  .legend span{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-2)}
  .legend i{width:9px;height:9px;border-radius:2px}
  .big{font-size:30px;font-weight:800;font-family:var(--font);line-height:1.05}

  /* ---------- Code editor (requirement 3) ---------- */
  .editor-col{position:sticky;top:74px}
  .editor{padding:0;overflow:hidden}
  .editor .ehead{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--border-soft)}
  .editor .ehead .et{font-size:13px;font-weight:700}
  .editor .ehead .hint{font-size:11px;color:var(--muted);margin-left:auto}
  /* The editor is a plain textarea with monospace styling — a dependency-free, CSP-safe
     "Monaco-equivalent". It stays fully accessible and keyboard-navigable. */
  .code{width:100%;min-height:420px;max-height:60vh;resize:vertical;border:none;outline:none;
    background:#0b111b;color:#dfe8f2;font-family:var(--mono);font-size:12.5px;line-height:1.55;
    padding:14px;tab-size:2;white-space:pre;overflow:auto}
  .estatus{padding:9px 14px;font-size:12px;border-top:1px solid var(--border-soft);display:flex;align-items:center;gap:8px}
  .estatus.ok{color:var(--positive)}.estatus.err{color:var(--negative)}
  .estatus .badge{font-size:10px;font-weight:800;padding:2px 7px;border-radius:999px;background:rgba(255,255,255,.06)}
  .toolbar{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--border-soft);flex-wrap:wrap}
  .btn{background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--border);border-radius:999px;
    padding:6px 12px;font:inherit;font-size:12px;cursor:pointer;transition:.15s}
  .btn:hover{background:rgba(255,255,255,.15)}
  .btn.primary{background:linear-gradient(135deg,var(--forest),var(--forest-light));border-color:transparent}
  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0}
</style>
</head>
<body>
  <!-- Top bar: brand + live breadcrumb + real-time sync indicator -->
  <header class="topbar">
    <div class="brand"><span class="mark">▲</span> TerraVest <span style="color:var(--muted);font-weight:500">Design Sync Studio</span></div>
    <nav class="crumb" id="crumb" aria-label="Breadcrumb"></nav>
    <div class="sync" role="status" aria-live="polite">
      <span class="pulse" id="pulse"></span> <span id="syncText">In sync · 1 source of truth</span>
    </div>
  </header>

  <main class="work">
    <!-- LEFT: grouped section navigator (requirement 2 — identifiability) -->
    <aside class="glass nav" id="nav" aria-label="App sections and screens"></aside>

    <!-- CENTER: three synced device previews, all rendered from the SAME model -->
    <section aria-label="Synced previews">
      <div class="previews" id="previews"></div>
    </section>

    <!-- RIGHT: live code editor for the active screen's spec -->
    <aside class="editor-col glass editor">
      <div class="ehead">
        <span class="et">Screen spec</span>
        <span class="hint">edits render live in all 3 panels</span>
      </div>
      <label class="sr-only" for="code">Active screen JSON specification</label>
      <textarea class="code" id="code" spellcheck="false" aria-describedby="estatus"></textarea>
      <div class="estatus ok" id="estatus"><span class="badge">JSON</span><span id="estatusText">Valid · synced</span></div>
      <div class="toolbar">
        <button class="btn" id="btnFormat">Format</button>
        <button class="btn" id="btnReset">Reset screen</button>
        <button class="btn primary" id="btnAddCard">+ Add card block</button>
      </div>
    </aside>
  </main>

<script>
/* ==========================================================================
   1) SINGLE SOURCE OF TRUTH — the screen model.
   Each screen is a declarative spec: a section + an ordered list of "blocks".
   Web / iOS / Android all render from this ONE object, which is why they can
   never drift apart. Adding an app screen = adding one entry here.
   ========================================================================== */
const SECTIONS = {
  today:      {label:'Today',        color:'var(--sec-today)'},
  money:      {label:'Money',        color:'var(--sec-money)'},
  grow:       {label:'Grow',         color:'var(--sec-grow)'},
  shared:     {label:'Shared',       color:'var(--sec-shared)'},
  business:   {label:'Business & Tax',color:'var(--sec-business)'},
  realestate: {label:'Real Estate',  color:'var(--sec-realestate)'},
  more:       {label:'More',         color:'var(--sec-more)'},

// Canonical category palette (mirrors utils/categoryPalette.js) so a category is the
// same color here as in the real app.
const C = {housing:'#F25FA8',shopping:'#4EA8F0',food:'#F5C445',groceries:'#4FBE83',
  auto:'#F0803C',utilities:'#7A6FF0',medical:'#E5675A',entertainment:'#2CC4C4',

    {type:'stacked',title:'Last 6 months',legend:[{k:'In',c:C.income},{k:'Out',c:C.auto}],periods:[
      {label:'Feb',segs:[{v:62,c:C.income},{v:48,c:C.auto}]},{label:'Mar',segs:[{v:60,c:C.income},{v:52,c:C.auto}]},
      {label:'Apr',segs:[{v:64,c:C.income},{v:47,c:C.auto}]},{label:'May',segs:[{v:66,c:C.income},{v:55,c:C.auto}]},
      {label:'Jun',segs:[{v:63,c:C.income},{v:49,c:C.auto}]},{label:'Jul',segs:[{v:68,c:C.income},{v:51,c:C.auto}]}]},
  ]},
  spending:{section:'money',name:'Spending',blocks:[
    {type:'header',title:'Spending insights',subtitle:'Where your money actually goes'},
    {type:'donut',title:'By category',total:'$80,090',segments:[
      {label:'Utilities',value:29902,color:C.utilities},{label:'Shopping',value:13513,color:C.shopping},
      {label:'Auto',value:13139,color:C.auto},{label:'Other',value:14082,color:C.other},

  yearinreview:{section:'money',name:'Year in Review',isNew:true,blocks:[

    {type:'kpis',items:[{l:'You spent',v:'$89,455'},{l:'You earned',v:'$112,300'},{l:'Net',v:'+$22,845',up:true}]},

  healthscore:{section:'grow',name:'Health Score',blocks:[
    {type:'header',title:'Financial health score',subtitle:'One number for where you stand'},
    {type:'gauge',score:720,min:300,max:850},
    {type:'factors',rows:[

      {label:'Emergency fund',weight:25,status:'Fair',pct:58,tone:'warn'},

  ]},
  sharedmoney:{section:'shared',name:'Goals & Bills',blocks:[
    {type:'header',title:'Shared goals & bills',subtitle:'What you save for together'},
    {type:'list',title:'Shared goals',rows:[
      {dot:C.income,label:'House down payment',sub:'Alex $11,200 · Jordan $7,200',val:'$18,400'},
      {dot:C.shopping,label:'Summer trip',sub:'62% funded',val:'$3,100'}]},
  ]},
  mybusiness:{section:'business',name:'My Business',blocks:[
    {type:'header',title:'My Business',subtitle:'Acme LLC · Connected'},
    {type:'kpis',items:[{l:'Revenue MTD',v:'$42,100',d:'+8%',up:true},{l:'Expenses',v:'$18,300'},{l:'Net profit',v:'$23,800',up:true}]},
    {type:'bars',title:'Revenue · 6 months',series:[
      {label:'Feb',value:44,color:'#F0803C'},{label:'Mar',value:52,color:'#F0803C'},{label:'Apr',value:48,color:'#F0803C'},
      {label:'May',value:61,color:'#F0803C'},{label:'Jun',value:55,color:'#F0803C'},{label:'Jul',value:63,color:'#F0803C'}]},
  ]},
  properties:{section:'realestate',name:'Properties',blocks:[
    {type:'header',title:'Properties',subtitle:'Your real estate portfolio'},
    {type:'kpis',items:[{l:'Total value',v:'$720k',up:true},{l:'Equity',v:'$310k'},{l:'Mortgage',v:'$410k'}]},
    {type:'list',title:'Portfolio',rows:[
      {dot:C.entertainment,label:'123 Oak St · Primary',sub:'Equity $185k',val:'$420k'},

/* ==========================================================================
   2) OBSERVABLE STORE — the reactive single source of truth.
   Any part of the UI can subscribe(); set() notifies every subscriber, which is
   what makes all three device panels update together in real time (requirement 1).
   This is the "clean state management / observable pattern" the brief asks for.
   ========================================================================== */
function createStore(initial){
  let state = initial;
  const subs = new Set();
  return {
    get:()=>state,
    set:(patch)=>{ state = {...state, ...patch}; subs.forEach(fn=>fn(state)); },
    // Mutate a single screen's blocks immutably, then notify.
    updateScreen:(id, blocks)=>{ state = {...state, screens:{...state.screens, [id]:{...state.screens[id], blocks}}}; subs.forEach(fn=>fn(state)); },
    subscribe:(fn)=>{ subs.add(fn); return ()=>subs.delete(fn); },
  };
}
const store = createStore({ activeId:'yearinreview', screens:SCREENS });

/* ==========================================================================
   3) RENDERERS — a small component library. Each block type maps to one pure
   function returning an HTML string, so Web/iOS/Android reuse identical output.
   ========================================================================== */
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

// SVG donut with a bold total in the middle (icici.png layout).
function donut(segments,total,size=132,thick=20){
  const clean=segments.filter(s=>+s.value>0); const sum=clean.reduce((a,s)=>a+ +s.value,0);
  const r=(size-thick)/2, c=2*Math.PI*r, cx=size/2; let off=0;
  const arcs=clean.map(s=>{const f=sum?+s.value/sum:0;const len=Math.max(0,f*c-2);
    const a=`<circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${s.color}" stroke-width="${thick}" stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}"/>`;off+=f*c;return a;}).join('');
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="max-width:100%">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${thick}" opacity=".5"/>
    <g transform="rotate(-90 ${cx} ${cx})">${arcs}</g>
    <text x="${cx}" y="${cx-2}" text-anchor="middle" dominant-baseline="middle" style="font-weight:700;font-size:${size*0.15}px;fill:var(--text)">${esc(total)}</text>
    <text x="${cx}" y="${cx+size*0.12}" text-anchor="middle" style="font-size:${size*0.07}px;fill:var(--muted)">Total</text></svg>`;
}
// SVG progress ring (IMG_1683 dial).
function ring(pct,label,size=118,thick=12,color='var(--positive)'){
  const r=(size-thick)/2,c=2*Math.PI*r,cx=size/2,dash=Math.max(0,Math.min(1,pct))*c;
  return `<svg viewBox="0 0 ${size} ${size}" width="${size}" height="${size}" style="transform:rotate(-90deg)">
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="var(--border)" stroke-width="${thick}"/>
    <circle cx="${cx}" cy="${cx}" r="${r}" fill="none" stroke="${color}" stroke-width="${thick}" stroke-linecap="round" stroke-dasharray="${dash} ${c-dash}"/>
    <text x="${cx}" y="${cx}" transform="rotate(90 ${cx} ${cx})" text-anchor="middle" dominant-baseline="middle" style="font-weight:700;font-size:${size*0.2}px;fill:var(--text)">${Math.round(pct*100)}%</text>
    <text x="${cx}" y="${cx+size*0.16}" transform="rotate(90 ${cx} ${cx})" text-anchor="middle" style="font-size:${size*0.1}px;fill:var(--muted)">${esc(label||'')}</text></svg>`;
}
// SVG semicircular banded score gauge (300–850) — the credit/health centerpiece.
function gauge(score,min,max,size=230){
  const bands=[[300,579,'#F0776B'],[580,669,'#F0A03C'],[670,739,'#E6C34B'],[740,799,'#5BB98C'],[800,850,'#3DDC97']];
  const stroke=size*0.09,r=(size-stroke)/2-2,cx=size/2,cy=r+stroke/2+2,H=cy+stroke;
  const ang=s=>Math.PI*(1-(Math.max(min,Math.min(max,s))-min)/(max-min));
  const pt=(s,rad=r)=>[cx+rad*Math.cos(ang(s)),cy-rad*Math.sin(ang(s))];
  const arc=(a,b)=>{const[x0,y0]=pt(a),[x1,y1]=pt(b);return `M ${x0} ${y0} A ${r} ${r} 0 0 1 ${x1} ${y1}`;};
  const active=bands.find(b=>score>=b[0]&&score<=b[1])||bands[0];
  const[mx,my]=pt(score);
  return `<svg viewBox="0 0 ${size} ${H}" width="${size}" height="${H}" style="max-width:100%">
    <path d="${arc(min,max)}" fill="none" stroke="var(--border)" stroke-width="${stroke}" stroke-linecap="round" opacity=".5"/>
    ${bands.map(b=>`<path d="${arc(b[0],b[1])}" fill="none" stroke="${b[2]}" stroke-width="${stroke}"/>`).join('')}
    <circle cx="${mx}" cy="${my}" r="${stroke*0.6}" fill="var(--bg)" stroke="${active[2]}" stroke-width="${stroke*0.3}"/>
    <text x="${cx}" y="${cy-r*0.15}" text-anchor="middle" style="font-weight:800;font-size:${size*0.15}px;fill:var(--text)">${score}</text>
    <text x="${cx}" y="${cy-r*0.15+size*0.07}" text-anchor="middle" style="font-size:${size*0.05}px;font-weight:700;fill:${active[2]};letter-spacing:.05em">${active[0]<580?'POOR':active[0]<670?'FAIR':active[0]<740?'GOOD':active[0]<800?'VERY GOOD':'EXCEPTIONAL'}</text></svg>`;
}
function barsBlock(b){
  const max=Math.max(1,...b.series.map(s=>+s.value));
  return card(b.title,`<div class="barsc">${b.series.map(s=>`<div class="col">
    <div class="stack" style="height:${Math.round(+s.value/max*110)}px"><div style="height:100%;background:${s.color}"></div></div>
    <div class="cl">${esc(s.label)}</div></div>`).join('')}</div>`);
}
function stackedBlock(b){
  const totals=b.periods.map(p=>p.segs.reduce((a,s)=>a+ +s.v,0)),max=Math.max(1,...totals);
  const legend=`<div class="legend">${(b.legend||[]).map(l=>`<span><i style="background:${l.c}"></i>${esc(l.k)}</span>`).join('')}</div>`;
  return card(b.title,`<div class="barsc">${b.periods.map((p,i)=>{const tot=totals[i];
    return `<div class="col"><div class="stack" style="height:${Math.round(tot/max*110)}px">
      ${p.segs.map(s=>`<div style="height:${tot?(+s.v/tot*100):0}%;background:${s.c}"></div>`).join('')}</div>
      <div class="cl">${esc(p.label)}</div></div>`;}).join('')}</div>${legend}`);
}
function card(title,inner){return `<div class="sc-card">${title?`<div class="ct">${esc(title)}</div>`:''}${inner}</div>`;}
const TONE={good:'var(--positive)',warn:'var(--warning)',bad:'var(--negative)'};

// Render ONE block to HTML by dispatching on its type.
function renderBlock(b){
  switch(b.type){
    case 'header': return `<div class="sc-head"><div class="t">${esc(b.title)}</div><div class="s">${esc(b.subtitle||'')}</div></div>`;
    case 'kpis': return `<div class="kpis">${b.items.map(k=>`<div class="kpi"><div class="l">${esc(k.l)}</div><div class="v">${esc(k.v)}</div>${k.d?`<div class="d ${k.up?'up':'down'}">${k.up?'▲':'▼'} ${esc(k.d)}</div>`:''}</div>`).join('')}</div>`;
    case 'donut': return card(b.title,`<div style="display:flex;gap:14px;align-items:center;flex-wrap:wrap">
      <div>${donut(b.segments,b.total)}</div>
      <div style="flex:1;min-width:150px">${b.segments.map(s=>`<div class="row"><span class="dot" style="background:${s.color}"></span><span class="rl">${esc(s.label)}</span><span class="rv">${esc(typeof s.value==='number'?'$'+s.value.toLocaleString():s.value)}</span></div>`).join('')}</div></div>`);
    case 'ring': return card('',`<div style="display:flex;gap:16px;align-items:center">${ring(b.pct,b.label)}<div><div class="rv" style="font-size:14px">${esc(b.caption||'')}</div></div></div>`);
    case 'gauge': return card('',`<div style="display:flex;justify-content:center">${gauge(b.score,b.min,b.max)}</div>`);
    case 'bars': return barsBlock(b);
    case 'stacked': return stackedBlock(b);
    case 'list': return card(b.title,b.rows.map(r=>`<div class="row"><span class="dot" style="background:${r.dot||'var(--muted)'}"></span><div class="rl">${esc(r.label)}<div class="rs">${esc(r.sub||'')}</div></div><span class="rv">${esc(r.val||'')}</span></div>`).join(''));
    case 'factors': return card('What\'s affecting it',b.rows.map(r=>`<div style="padding:7px 0"><div style="display:flex;gap:8px;align-items:center;margin-bottom:5px"><span style="font-size:12.5px;font-weight:600">${esc(r.label)}</span><span class="rs">${r.weight}%</span><span class="pill" style="margin-left:auto;background:rgba(255,255,255,.06);color:${TONE[r.tone]}">${esc(r.status)}</span></div><div style="height:6px;border-radius:4px;background:rgba(255,255,255,.06);overflow:hidden"><div style="width:${r.pct}%;height:100%;background:${TONE[r.tone]}"></div></div></div>`).join(''));
    case 'verdict': return `<div class="sc-card" style="border-left:3px solid ${TONE[b.tone]||'var(--warning)'}"><div style="font-weight:700;font-size:14px">${esc(b.title)}</div><div class="rs" style="margin-top:3px">${esc(b.detail||'')}</div></div>`;
    default: return card('Unknown block',`<div class="rs">type: ${esc(b.type)}</div>`);
  }
}
function renderScreen(screen){
  try{ return `<div class="sc">${screen.blocks.map(renderBlock).join('')}</div>`; }
  catch(e){ return `<div class="sc"><div class="sc-card" style="color:var(--negative)">Render error: ${esc(e.message)}</div></div>`; }
}

/* ==========================================================================
   4) VIEW WIRING — subscribe the three panels, navigator, and breadcrumb to the
   store. One render() runs on every state change → guaranteed sync.
   ========================================================================== */
const $=(s)=>document.querySelector(s);
function deviceFrames(html){
  return `
    <div class="device">
      <div class="device-label"><span class="d-dot"></span>Web · Browser</div>
      <div class="frame-web"><div class="bar"><i></i><i></i><i></i><span class="url">app.terravest.app</span></div><div class="screen">${html}</div></div>
    </div>
    <div class="device">
      <div class="device-label"><span class="d-dot"></span>iOS · iPhone</div>
      <div class="frame-phone"><div class="notch"></div><div class="screen">${html}</div></div>
    </div>
    <div class="device">
      <div class="device-label"><span class="d-dot"></span>Android · Pixel</div>
      <div class="frame-phone android"><div class="notch"></div><div class="screen">${html}</div></div>
    </div>`;
}
function renderNav(state){
  const groups={};
  Object.entries(state.screens).forEach(([id,s])=>{(groups[s.section]=groups[s.section]||[]).push([id,s]);});
  let html='';
  Object.keys(SECTIONS).forEach(sec=>{
    if(!groups[sec]) return;
    html+=`<h2>${esc(SECTIONS[sec].label)}</h2>`;
    groups[sec].forEach(([id,s])=>{
      html+=`<button class="nav-item" data-id="${id}" aria-current="${state.activeId===id}">
        <span class="dot" style="background:${SECTIONS[sec].color}"></span>${esc(s.name)}
        ${s.isNew?'<span class="new">NEW</span>':''}</button>`;
    });
  });
  $('#nav').innerHTML=html;
}
function renderCrumb(state){
  const s=state.screens[state.activeId], sec=SECTIONS[s.section];
  $('#crumb').innerHTML=`<span class="sec-dot" style="background:${sec.color}"></span>${esc(sec.label)} <span>›</span> <strong>${esc(s.name)}</strong>`;
}
function pulse(){const p=$('#pulse');p.classList.remove('on');void p.offsetWidth;p.classList.add('on');}

let lastActive=null;
function render(state){
  const screen=state.screens[state.activeId];
  $('#previews').innerHTML=deviceFrames(renderScreen(screen)); // all 3 panels, one source
  renderNav(state); renderCrumb(state); pulse();
  // Load the editor with the active screen's spec ONLY when the screen changes, so typing
  // never fights the cursor. Edits flow the other way (editor → store) below.
  if(lastActive!==state.activeId){
    $('#code').value=JSON.stringify(screen.blocks,null,2);
    setStatus(true,'Valid · synced'); lastActive=state.activeId;
  }
}
function setStatus(ok,msg){const el=$('#estatus');el.className='estatus '+(ok?'ok':'err');$('#estatusText').textContent=msg;}
store.subscribe(render);

/* ---- Navigator clicks: switch the single active screen ---- */
$('#nav').addEventListener('click',e=>{const b=e.target.closest('.nav-item');if(b)store.set({activeId:b.dataset.id});});

/* ---- Live code editing (requirement 3): debounced parse → update store → re-render.
   On invalid JSON we surface an error but keep the last good visualization intact. ---- */
let t;
$('#code').addEventListener('input',e=>{
  clearTimeout(t);
  t=setTimeout(()=>{
    try{
      const blocks=JSON.parse(e.target.value);
      if(!Array.isArray(blocks)) throw new Error('Spec must be an array of blocks');
      setStatus(true,'Valid · synced');
      store.updateScreen(store.get().activeId, blocks); // propagates to all 3 panels
    }catch(err){ setStatus(false,'Invalid JSON — '+err.message); }
  },250);
});
// Support Tab in the textarea (small editor nicety, keeps focus in the code).
$('#code').addEventListener('keydown',e=>{
  if(e.key==='Tab'){e.preventDefault();const s=e.target.selectionStart;e.target.value=e.target.value.slice(0,s)+'  '+e.target.value.slice(e.target.selectionEnd);e.target.selectionStart=e.target.selectionEnd=s+2;}
});

/* ---- Toolbar actions ---- */
$('#btnFormat').addEventListener('click',()=>{try{$('#code').value=JSON.stringify(JSON.parse($('#code').value),null,2);setStatus(true,'Formatted');}catch(err){setStatus(false,'Cannot format invalid JSON');}});
$('#btnReset').addEventListener('click',()=>{const id=store.get().activeId;store.updateScreen(id,JSON.parse(JSON.stringify(SCREENS[id].blocks)));lastActive=null;render(store.get());});
$('#btnAddCard').addEventListener('click',()=>{
  try{const blocks=JSON.parse($('#code').value);blocks.push({type:'list',title:'New card',rows:[{dot:'#3DDC97',label:'Edit me',sub:'in the code panel',val:'→'}]});
    $('#code').value=JSON.stringify(blocks,null,2);store.updateScreen(store.get().activeId,blocks);setStatus(true,'Added a card block');
  }catch(err){setStatus(false,'Fix the JSON first');}
});

/* ---- Initial paint ---- */
render(store.get());
</script>
</body>
