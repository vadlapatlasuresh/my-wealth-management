<svg width="96" height="96" viewBox="0 0 96 96" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Brand mark">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="96" y2="96" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A4D3B"/>
      <stop offset="1" stop-color="#2D6B52"/>
    </linearGradient>
    <linearGradient id="gold" x1="20" y1="72" x2="76" y2="22" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#C9973A"/>
      <stop offset="1" stop-color="#F0C878"/>
    </linearGradient>
  </defs>

  <!-- rounded tile -->
  <rect width="96" height="96" rx="24" fill="url(#tile)"/>

  <!-- foundation: a solid base (terra / your grounded assets) -->
  <path d="M22 70 L48 50 L74 70 Z" fill="#8AB89A" opacity="0.30"/>

  <!-- growth: ascending line that climbs from base to a high value node -->
  <path d="M22 68 L40 54 L54 62 L74 30" stroke="url(#gold)" stroke-width="6"
        fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- value node at the summit -->
  <circle cx="74" cy="30" r="6.5" fill="url(#gold)"/>
  <circle cx="74" cy="30" r="6.5" fill="#1A4D3B" opacity="0.0"/>
</svg>
